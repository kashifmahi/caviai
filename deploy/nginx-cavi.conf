# Nginx config for CAVI  ->  /etc/nginx/sites-available/cavi
# Serves the React build and reverse-proxies /api to the FastAPI backend.
# Replace yourdomain.com with your real domain.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ---- React static frontend (production build) ----
    root /var/www/cavi/frontend/build;
    index index.html;

    # gzip for faster loads
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- API -> FastAPI backend (uvicorn on 127.0.0.1:8001) ----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- SPA routing: send everything else to index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10M;
}
